{% extends 'base.html' %}

{% block content %}
<section class="settings-hero panel-card">
    <div>
        <span class="page-kicker">Administração</span>
        <h1 class="settings-hero__title">Configurações do sistema</h1>
        <p class="settings-hero__description">
            Centralize aqui os cadastros estruturais e os ajustes administrativos usados pelo painel operacional.
        </p>
    </div>
</section>

<section class="settings-hub">
    {% for item in settings_items %}
    <a class="settings-hub__item panel-card" href="{{ item.url }}">
        <div class="settings-hub__item-main">
            <h3>{{ item.title }}</h3>
            <p>{{ item.description }}</p>
        </div>
        <span class="settings-hub__arrow" aria-hidden="true">&rsaquo;</span>
    </a>
    {% endfor %}
</section>
{% endblock %}
